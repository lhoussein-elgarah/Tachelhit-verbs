<!DOCTYPE html>
<html lang="ber">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conjugueur Tachelhit - ⴰⵎⵙⵙⵉⵏⵖ</title>
    <style>
        :root {
            --primary: #2b5c77;
            --secondary: #3b8ba8;
            --accent: #d94f33;
            --bg-light: #f5f7f9;
            --text-main: #333333;
            --border-color: #e0e5ec;
            --tif-color: #b33922;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        /* LAYOUT PRINCIPAL : SIDEBAR + CONTENU */
        .app-wrapper {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            gap: 25px;
            align-items: flex-start;
        }

        /* SIDEBAR (INDEX) */
        .sidebar {
            width: 260px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 20px;
            flex-shrink: 0;
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .sidebar h3 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.3rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            text-align: center;
        }

        .index-group {
            margin-bottom: 20px;
        }

        .index-group-title {
            background: var(--bg-light);
            color: var(--secondary);
            padding: 5px 10px;
            font-weight: bold;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .index-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .index-list li {
            padding: 8px 10px;
            cursor: pointer;
            border-bottom: 1px solid #f5f5f5;
            transition: all 0.2s;
            font-size: 1.05rem;
            display: flex;
            justify-content: space-between;
        }

        .index-list li:hover {
            background-color: #f8fbfa;
            color: var(--primary);
            padding-left: 15px;
            border-left: 3px solid var(--secondary);
        }

        .index-list li span.tif-hint {
            color: #999;
            font-size: 0.8rem;
        }

        /* CONTENU PRINCIPAL */
        .main-content {
            flex-grow: 1;
            min-width: 0; /* Empêche le débordement sur flexbox */
        }

        header {
            text-align: center;
            padding: 25px 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 2.2rem; }
        .subtitle { font-weight: 300; margin-top: 5px; opacity: 0.9; }

        .search-wrapper {
            position: relative;
            margin-bottom: 30px;
            z-index: 50;
        }

        #searchBox {
            width: 100%;
            padding: 16px 25px;
            font-size: 1.15rem;
            border: 2px solid var(--border-color);
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            outline: none;
            transition: all 0.3s ease;
        }

        #searchBox:focus {
            border-color: var(--secondary);
            box-shadow: 0 5px 20px rgba(59, 139, 168, 0.2);
        }

        #suggestionsList {
            position: absolute;
            top: 100%;
            left: 20px;
            right: 20px;
            background: white;
            border-radius: 0 0 15px 15px;
            max-height: 350px;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none;
            margin-top: 5px;
            border: 1px solid var(--border-color);
        }

        .suggestion {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .suggestion:hover { background-color: #f8fbfa; color: var(--primary); }

        .result-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .card-header {
            background: #fdfdfd;
            padding: 25px 30px;
            border-bottom: 3px solid var(--secondary);
            text-align: center;
        }

        .verb-main-title {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .verb-latin { color: var(--primary); font-size: 2.5rem; font-weight: bold; margin: 0; text-transform: lowercase; }
        .verb-tifinagh { color: var(--tif-color); font-size: 2.8rem; font-weight: normal; margin: 0; }

        .verb-translations { display: flex; justify-content: center; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        .trans-badge { background: #f0f4f8; padding: 8px 16px; border-radius: 20px; font-size: 1rem; color: #444; border: 1px solid #dce4ec; display: flex; align-items: center; gap: 8px; }

        .type-tag { display: inline-block; font-size: 0.8rem; background: #eee; padding: 4px 12px; border-radius: 12px; color: #555; margin-top: 15px; }

        .table-container { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background-color: var(--bg-light); text-align: left; padding: 16px; font-size: 0.85rem; text-transform: uppercase; color: #666; border-bottom: 2px solid var(--border-color); }
        td { padding: 15px 16px; border-bottom: 1px solid #f0f0f0; font-size: 1.05rem; }
        .col-pronom { font-weight: 700; color: var(--primary); background: #fafbfc; width: 140px; }
        tbody tr:hover { background-color: #fefefe; }
        tbody tr:hover td:not(.col-pronom) { color: var(--secondary); }
        .empty-val { color: #b2bec3; font-style: italic; }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .app-wrapper { flex-direction: column; }
            .sidebar { width: 100%; position: static; max-height: 300px; order: 2; margin-top: 20px; }
            .main-content { order: 1; width: 100%; }
            .verb-main-title { flex-direction: column; gap: 5px; }
        }

    </style>
</head>

<div class="app-wrapper">

        </div>
    </main>
</div>

/**
 * GÉNÉRATION DE L'INDEX DANS LA SIDEBAR
 */
function initSidebar() {
    const sidebarIndex = document.getElementById('sidebarIndex');
    
    // Groupes alphabétiques
    const groups = {
        "A - F": [],
        "G - P": [],
        "Q - Z": []
    };

    sortedVerbs.forEach(verb => {
        const firstLetter = verb.charAt(0).toUpperCase();
        if (firstLetter >= 'A' && firstLetter <= 'F') groups["A - F"].push(verb);
        else if (firstLetter >= 'G' && firstLetter <= 'P') groups["G - P"].push(verb);
        else groups["Q - Z"].push(verb);
    });

    // Construire le HTML
    let html = '';
    for (const [groupName, verbs] of Object.entries(groups)) {
        if (verbs.length === 0) continue; // Ne pas afficher les groupes vides
        
        html += `<div class="index-group">
                    <div class="index-group-title">${groupName}</div>
                    <ul class="index-list">`;
        
        verbs.forEach(v => {
            html += `<li onclick="renderVerb('${v}')">
                        <span>${v}</span>
                        <span class="tif-hint">${VERBES_DB[v].tif}</span>
                     </li>`;
        });
        
        html += `   </ul>
                 </div>`;
    }

    sidebarIndex.innerHTML = html;
}

/**
 * LOGIQUE DE RECHERCHE ET D'AFFICHAGE (IDENTIQUE)
 */
const searchBox = document.getElementById('searchBox');
const suggestionsList = document.getElementById('suggestionsList');
const resultCard = document.getElementById('resultCard');
const verbLatin = document.getElementById('verbLatin');
const verbTifinagh = document.getElementById('verbTifinagh');
const verbFr = document.getElementById('verbFr');
const verbEn = document.getElementById('verbEn');
const verbType = document.getElementById('verbType');
const verbTableBody = document.getElementById('verbTableBody');

searchBox.addEventListener('input', function() {
    const inputVal = this.value.toLowerCase().trim();
    suggestionsList.innerHTML = '';
    
    if (inputVal.length > 0) {
        const matchingKeys = Object.keys(VERBES_DB).filter(verb => 
            verb.toLowerCase().includes(inputVal) || 
            VERBES_DB[verb].fr.toLowerCase().includes(inputVal)
        );

        if (matchingKeys.length > 0) {
            matchingKeys.forEach(key => {
                const suggDiv = document.createElement('div');
                suggDiv.className = 'suggestion';
                suggDiv.innerHTML = `<strong>${key}</strong> <span style="font-size:0.8rem; color:#888;">(${VERBES_DB[key].fr})</span>`;
                suggDiv.onclick = () => renderVerb(key);
                suggestionsList.appendChild(suggDiv);
            });
            suggestionsList.style.display = 'block';
        } else {
            suggestionsList.style.display = 'none';
        }
    } else {
        suggestionsList.style.display = 'none';
    }
});

function renderVerb(key) {
    const data = VERBES_DB[key];
    searchBox.value = '';
    suggestionsList.style.display = 'none';
    
    verbLatin.textContent = key;
    verbTifinagh.textContent = data.tif;
    verbFr.textContent = data.fr;
    verbEn.textContent = data.en;
    verbType.textContent = data.t;
    
    verbTableBody.innerHTML = '';
    data.c.forEach(row => {
        const tr = document.createElement('tr');
        row.forEach((cell, idx) => {
            const td = document.createElement('td');
            if (idx === 0) td.className = 'col-pronom';
            
            if (!cell || cell.trim() === '') {
                td.innerHTML = '<span class="empty-val">-</span>';
            } else {
                td.textContent = cell;
            }
            tr.appendChild(td);
        });
        verbTableBody.appendChild(tr);
    });

    resultCard.style.display = 'block';
    
    // Si on est sur mobile, scroller automatiquement vers le résultat
    if (window.innerWidth <= 900) {
        resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

document.addEventListener('click', (e) => {
    if (e.target !== searchBox) {
        suggestionsList.style.display = 'none';
    }
});

// Initialiser la sidebar au chargement de la page
window.onload = initSidebar;

</script>
